# Scoop App Versions Workflow Update App Version Json

## Action

Follow the update-app-version-json workflow:
1. Identify the application to update.
2. Edit the corresponding 'bucket/{app-name}.json' file to update the version and possibly the download URL/hash.
3. Commit the change with a message indicating the app and new version.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~60x per month
- Files: bucket/*.json

